<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | SAFEAI Personal Safety Companion</title>
  <style>
    body {
      background-color: #0b0f19;
      color: #f3f4f6;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      background-color: #151d30;
      border: 1px solid #1f2e4c;
      border-radius: 16px;
      padding: 40px;
      max-width: 400px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      margin: 20px;
    }
    .icon {
      font-size: 64px;
      color: #ef4444;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      font-weight: 700;
    }
    p {
      color: #9ca3af;
      margin-bottom: 30px;
      line-height: 1.5;
    }
    button {
      background-color: #ef4444;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-weight: 600;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.3s;
      width: 100%;
    }
    button:hover {
      background-color: #dc2626;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">⚠️</div>
    <h1>You are Offline</h1>
    <p>SAFEAI is currently unable to load this page because you do not have an active internet connection. Please verify your connection and try again.</p>
    <button onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
